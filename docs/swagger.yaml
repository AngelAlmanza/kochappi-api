basePath: /api/v1
definitions:
  dto.AddRoutineDetailRequest:
    properties:
      dayOfWeek:
        example: 1
        maximum: 6
        minimum: 0
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    required:
    - dayOfWeek
    - displayOrder
    - exerciseId
    - reps
    - sets
    type: object
  dto.AddTemplateDetailRequest:
    properties:
      dayOfWeek:
        example: 1
        maximum: 6
        minimum: 0
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    required:
    - dayOfWeek
    - displayOrder
    - exerciseId
    - reps
    - sets
    type: object
  dto.AuthResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.CreateCustomerRequest:
    properties:
      birthdate:
        example: "1990-01-01"
        type: string
      name:
        example: Jhon Doe
        type: string
      userId:
        example: 1
        type: integer
    required:
    - birthdate
    - name
    - userId
    type: object
  dto.CreateExerciseLogRequest:
    properties:
      notes:
        example: Felt strong
        type: string
      repsDone:
        example: 10
        minimum: 0
        type: integer
      routineDetailId:
        example: 1
        type: integer
      setNumber:
        example: 1
        minimum: 1
        type: integer
      weight:
        example: 50
        minimum: 0
        type: number
    required:
    - repsDone
    - routineDetailId
    - setNumber
    - weight
    type: object
  dto.CreateExerciseRequest:
    properties:
      name:
        example: Squat
        type: string
      videoUrl:
        example: https://example.com/squat.mp4
        type: string
    required:
    - name
    type: object
  dto.CreateProgressLogRequest:
    properties:
      checkDate:
        example: "2024-01-15"
        type: string
      weight:
        example: 75
        type: integer
    required:
    - checkDate
    - weight
    type: object
  dto.CreateRoutineDetailRequest:
    properties:
      dayOfWeek:
        example: 1
        maximum: 6
        minimum: 0
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    required:
    - dayOfWeek
    - displayOrder
    - exerciseId
    - reps
    - sets
    type: object
  dto.CreateRoutineRequest:
    properties:
      customerId:
        example: 1
        type: integer
      details:
        items:
          $ref: '#/definitions/dto.CreateRoutineDetailRequest'
        type: array
      isActive:
        example: false
        type: boolean
      name:
        example: My Routine
        type: string
      templateId:
        example: 1
        type: integer
    required:
    - customerId
    - name
    type: object
  dto.CreateTemplateDetailRequest:
    properties:
      dayOfWeek:
        example: 1
        maximum: 6
        minimum: 0
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    required:
    - dayOfWeek
    - displayOrder
    - exerciseId
    - reps
    - sets
    type: object
  dto.CreateTemplateRequest:
    properties:
      description:
        example: Classic PPL split
        type: string
      details:
        items:
          $ref: '#/definitions/dto.CreateTemplateDetailRequest'
        type: array
      name:
        example: Push/Pull/Legs
        type: string
    required:
    - name
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role:
        enum:
        - trainer
        - client
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  dto.CustomerResponse:
    properties:
      birthdate:
        example: "1990-01-01"
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      code:
        example: ERROR_CODE
        type: string
      error:
        example: descriptive error message
        type: string
    type: object
  dto.ExerciseLogResponse:
    properties:
      id:
        example: 1
        type: integer
      notes:
        example: Felt strong
        type: string
      repsDone:
        example: 10
        type: integer
      routineDetailId:
        example: 1
        type: integer
      setNumber:
        example: 1
        type: integer
      weight:
        example: 50
        type: number
      workoutSessionId:
        example: 1
        type: integer
    type: object
  dto.ExerciseResponse:
    properties:
      id:
        example: 1
        type: integer
      name:
        example: Squat
        type: string
      videoUrl:
        example: https://example.com/squat.mp4
        type: string
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        example: john@example.com
        type: string
    required:
    - email
    type: object
  dto.GenerateDailySessionsResponse:
    properties:
      sessionsCreated:
        example: 3
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: secureP@ss123
        type: string
    required:
    - email
    - password
    type: object
  dto.MeResponse:
    properties:
      role:
        example: client
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.MessageResponse:
    properties:
      message:
        example: Operation completed successfully
        type: string
    type: object
  dto.ProgressLogResponse:
    properties:
      checkDate:
        example: "2024-01-15"
        type: string
      customerId:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      weight:
        example: 75
        type: integer
    type: object
  dto.ProgressLogWithPhotosResponse:
    properties:
      checkDate:
        example: "2024-01-15"
        type: string
      customerId:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      photos:
        items:
          $ref: '#/definitions/dto.ProgressPhotoResponse'
        type: array
      weight:
        example: 75
        type: integer
    type: object
  dto.ProgressPhotoResponse:
    properties:
      id:
        example: 1
        type: integer
      logId:
        example: 1
        type: integer
      pictureType:
        example: front
        type: string
      url:
        example: /uploads/progress_1_abc.jpg
        type: string
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: secureP@ss123
        maxLength: 72
        minLength: 8
        type: string
      role:
        enum:
        - trainer
        - client
        example: client
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  dto.ResetPasswordRequest:
    properties:
      email:
        example: john@example.com
        type: string
      new_password:
        example: newSecureP@ss123
        maxLength: 72
        minLength: 8
        type: string
      otp_code:
        example: "123456"
        type: string
    required:
    - email
    - new_password
    - otp_code
    type: object
  dto.RoutineDetailResponse:
    properties:
      dayOfWeek:
        example: 1
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    type: object
  dto.RoutinePeriodResponse:
    properties:
      endedAt:
        example: "2026-02-01T00:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      routineId:
        example: 1
        type: integer
      startedAt:
        example: "2026-01-01T00:00:00Z"
        type: string
    type: object
  dto.RoutineResponse:
    properties:
      customerId:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      isActive:
        example: false
        type: boolean
      name:
        example: My Routine
        type: string
      templateId:
        example: 1
        type: integer
    type: object
  dto.RoutineWithDetailsResponse:
    properties:
      customerId:
        example: 1
        type: integer
      details:
        items:
          $ref: '#/definitions/dto.RoutineDetailResponse'
        type: array
      id:
        example: 1
        type: integer
      isActive:
        example: false
        type: boolean
      name:
        example: My Routine
        type: string
      templateId:
        example: 1
        type: integer
    type: object
  dto.TemplateDetailResponse:
    properties:
      dayOfWeek:
        example: 1
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    type: object
  dto.TemplateResponse:
    properties:
      description:
        example: Classic PPL split
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Push/Pull/Legs
        type: string
    type: object
  dto.TemplateWithDetailsResponse:
    properties:
      description:
        example: Classic PPL split
        type: string
      details:
        items:
          $ref: '#/definitions/dto.TemplateDetailResponse'
        type: array
      id:
        example: 1
        type: integer
      name:
        example: Push/Pull/Legs
        type: string
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    type: object
  dto.UpdateCustomerRequest:
    properties:
      birthdate:
        example: "1990-01-01"
        type: string
      name:
        description: ID        int    `json:"id" binding:"required" example:"1"`
        example: Jhon Doe
        type: string
    required:
    - birthdate
    - name
    type: object
  dto.UpdateExerciseLogRequest:
    properties:
      notes:
        example: Felt strong
        type: string
      repsDone:
        example: 10
        minimum: 0
        type: integer
      setNumber:
        example: 1
        minimum: 1
        type: integer
      weight:
        example: 50
        minimum: 0
        type: number
    required:
    - repsDone
    - setNumber
    - weight
    type: object
  dto.UpdateExerciseRequest:
    properties:
      name:
        example: Squat
        type: string
      videoUrl:
        example: https://example.com/squat.mp4
        type: string
    required:
    - name
    type: object
  dto.UpdateRoutineRequest:
    properties:
      name:
        example: My Routine
        type: string
    required:
    - name
    type: object
  dto.UpdateTemplateRequest:
    properties:
      description:
        example: Classic PPL split
        type: string
      name:
        example: Push/Pull/Legs
        type: string
    required:
    - name
    type: object
  dto.UpdateUserEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.UpdateWorkoutSessionStatusRequest:
    properties:
      status:
        enum:
        - in_progress
        - completed
        - skipped
        example: in_progress
        type: string
    required:
    - status
    type: object
  dto.UserDetailResponse:
    properties:
      createdAt:
        example: "2026-01-01T00:00:00Z"
        type: string
      email:
        example: john@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
      role:
        example: trainer
        type: string
      updatedAt:
        example: "2026-01-01T00:00:00Z"
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        example: john@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
      role:
        example: client
        type: string
    type: object
  dto.WorkoutSessionResponse:
    properties:
      actualDate:
        example: "2026-01-15"
        type: string
      finishedAt:
        example: "2026-01-15T11:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      routineId:
        example: 1
        type: integer
      scheduledDay:
        example: 1
        type: integer
      startedAt:
        example: "2026-01-15T10:00:00Z"
        type: string
      status:
        example: pending
        type: string
    type: object
  dto.WorkoutSessionWithLogsResponse:
    properties:
      actualDate:
        example: "2026-01-15"
        type: string
      exerciseLogs:
        items:
          $ref: '#/definitions/dto.ExerciseLogResponse'
        type: array
      finishedAt:
        example: "2026-01-15T11:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      routineId:
        example: 1
        type: integer
      scheduledDay:
        example: 1
        type: integer
      startedAt:
        example: "2026-01-15T10:00:00Z"
        type: string
      status:
        example: pending
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: API for the Kochappi fitness platform.
  title: Kochappi API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset OTP code to the user's email
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Request password reset
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/me:
    get:
      description: Returns the authenticated user's ID and role
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Generates a new pair of access and refresh tokens using a valid
        refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and returns authentication tokens
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the user's password using the OTP code received via email
      parameters:
      - description: Reset password data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Reset password
      tags:
      - Auth
  /customers:
    get:
      description: Returns a list of all customers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CustomerResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all customers
      tags:
      - Customers
    post:
      consumes:
      - application/json
      description: Creates a new customer linked to an existing user with the client
        role
      parameters:
      - description: Customer data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CustomerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new customer
      tags:
      - Customers
  /customers/{id}:
    delete:
      description: Deletes a customer record (does not delete the associated user)
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a customer
      tags:
      - Customers
    get:
      description: Returns a single customer by its ID
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CustomerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a customer by ID
      tags:
      - Customers
    put:
      consumes:
      - application/json
      description: Updates an existing customer's name and birthdate
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Customer data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCustomerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CustomerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a customer
      tags:
      - Customers
  /customers/{id}/log_customer_progress:
    get:
      description: Returns all progress logs for a given customer
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProgressLogResponse'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List progress logs for a customer
      tags:
      - Progress
    post:
      consumes:
      - application/json
      description: Creates a new progress log for a customer with check date and weight
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Progress log data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProgressLogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProgressLogResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a progress log
      tags:
      - Progress
  /customers/{id}/log_customer_progress/{logId}:
    delete:
      description: Deletes a progress log and all its associated photos and files
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Progress Log ID
        in: path
        name: logId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a progress log
      tags:
      - Progress
    get:
      description: Returns a single progress log with its associated photos
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Progress Log ID
        in: path
