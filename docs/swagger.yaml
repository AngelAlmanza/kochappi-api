basePath: /api/v1
definitions:
  dto.AddTemplateDetailRequest:
    properties:
      dayOfWeek:
        example: 1
        maximum: 6
        minimum: 0
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    required:
    - dayOfWeek
    - displayOrder
    - exerciseId
    - reps
    - sets
    type: object
  dto.AuthResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.CreateCustomerRequest:
    properties:
      birthdate:
        example: "1990-01-01"
        type: string
      name:
        example: Jhon Doe
        type: string
      userId:
        example: 1
        type: integer
    required:
    - birthdate
    - name
    - userId
    type: object
  dto.CreateExerciseRequest:
    properties:
      name:
        example: Squat
        type: string
      videoUrl:
        example: https://example.com/squat.mp4
        type: string
    required:
    - name
    type: object
  dto.CreateTemplateDetailRequest:
    properties:
      dayOfWeek:
        example: 1
        maximum: 6
        minimum: 0
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    required:
    - dayOfWeek
    - displayOrder
    - exerciseId
    - reps
    - sets
    type: object
  dto.CreateTemplateRequest:
    properties:
      description:
        example: Classic PPL split
        type: string
      details:
        items:
          $ref: '#/definitions/dto.CreateTemplateDetailRequest'
        type: array
      name:
        example: Push/Pull/Legs
        type: string
    required:
    - name
    type: object
  dto.CustomerResponse:
    properties:
      birthdate:
        example: "1990-01-01"
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      code:
        example: ERROR_CODE
        type: string
      error:
        example: descriptive error message
        type: string
    type: object
  dto.ExerciseResponse:
    properties:
      id:
        example: 1
        type: integer
      name:
        example: Squat
        type: string
      videoUrl:
        example: https://example.com/squat.mp4
        type: string
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        example: john@example.com
        type: string
    required:
    - email
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: secureP@ss123
        type: string
    required:
    - email
    - password
    type: object
  dto.MeResponse:
    properties:
      role:
        example: client
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.MessageResponse:
    properties:
      message:
        example: Operation completed successfully
        type: string
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: secureP@ss123
        maxLength: 72
        minLength: 8
        type: string
      role:
        enum:
        - trainer
        - client
        example: client
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  dto.ResetPasswordRequest:
    properties:
      email:
        example: john@example.com
        type: string
      new_password:
        example: newSecureP@ss123
        maxLength: 72
        minLength: 8
        type: string
      otp_code:
        example: "123456"
        type: string
    required:
    - email
    - new_password
    - otp_code
    type: object
  dto.TemplateDetailResponse:
    properties:
      dayOfWeek:
        example: 1
        type: integer
      displayOrder:
        example: 1
        type: integer
      exerciseId:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      reps:
        example: 10
        type: integer
      sets:
        example: 3
        type: integer
    type: object
  dto.TemplateResponse:
    properties:
      description:
        example: Classic PPL split
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Push/Pull/Legs
        type: string
    type: object
  dto.TemplateWithDetailsResponse:
    properties:
      description:
        example: Classic PPL split
        type: string
      details:
        items:
          $ref: '#/definitions/dto.TemplateDetailResponse'
        type: array
      id:
        example: 1
        type: integer
      name:
        example: Push/Pull/Legs
        type: string
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    type: object
  dto.UpdateCustomerRequest:
    properties:
      birthdate:
        example: "1990-01-01"
        type: string
      name:
        description: ID        int    `json:"id" binding:"required" example:"1"`
        example: Jhon Doe
        type: string
    required:
    - birthdate
    - name
    type: object
  dto.UpdateExerciseRequest:
    properties:
      name:
        example: Squat
        type: string
      videoUrl:
        example: https://example.com/squat.mp4
        type: string
    required:
    - name
    type: object
  dto.UpdateTemplateRequest:
    properties:
      description:
        example: Classic PPL split
        type: string
      name:
        example: Push/Pull/Legs
        type: string
    required:
    - name
    type: object
  dto.UserResponse:
    properties:
      email:
        example: john@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
      role:
        example: client
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: API for the Kochappi fitness platform.
  title: Kochappi API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset OTP code to the user's email
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Request password reset
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/me:
    get:
      description: Returns the authenticated user's ID and role
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Generates a new pair of access and refresh tokens using a valid
        refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and returns authentication tokens
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the user's password using the OTP code received via email
      parameters:
      - description: Reset password data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Reset password
      tags:
      - Auth
  /customers:
    get:
      description: Returns a list of all customers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CustomerResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all customers
      tags:
      - Customers
    post:
      consumes:
      - application/json
      description: Creates a new customer linked to an existing user with the client
        role
      parameters:
      - description: Customer data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CustomerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new customer
      tags:
      - Customers
  /customers/{id}:
    delete:
      description: Deletes a customer record (does not delete the associated user)
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a customer
      tags:
      - Customers
    get:
      description: Returns a single customer by its ID
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CustomerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a customer by ID
      tags:
      - Customers
    put:
      consumes:
      - application/json
      description: Updates an existing customer's name and birthdate
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Customer data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCustomerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CustomerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a customer
      tags:
      - Customers
  /exercises:
    get:
      description: Returns a list of all exercises
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ExerciseResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all exercises
      tags:
      - Exercises
    post:
      consumes:
      - application/json
      description: Creates a new exercise and returns it
      parameters:
      - description: Exercise data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateExerciseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ExerciseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new exercise
      tags:
      - Exercises
  /exercises/{id}:
    delete:
      description: Deletes an exercise by its ID
      parameters:
      - description: Exercise ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an exercise
      tags:
      - Exercises
    get:
      description: Returns a single exercise by its ID
      parameters:
      - description: Exercise ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ExerciseResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get an exercise by ID
      tags:
      - Exercises
    put:
      consumes:
      - application/json
      description: Updates an existing exercise by its ID
      parameters:
      - description: Exercise ID
        in: path
        name: id
        required: true
        type: integer
      - description: Exercise data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateExerciseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ExerciseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update an exercise
      tags:
      - Exercises
  /templates:
    get:
      description: Returns a list of all templates (without details)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TemplateResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all templates
      tags:
      - Templates
    post:
      consumes:
      - application/json
      description: Creates a new template, optionally including exercise details
      parameters:
      - description: Template data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTemplateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.TemplateWithDetailsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new template
      tags:
      - Templates
  /templates/{id}:
    delete:
      description: Deletes a template. Associated details are cascade-deleted and
        routines referencing this template will have template_id set to NULL
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a template
      tags:
      - Templates
    get:
      description: Returns a template with all its details
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TemplateWithDetailsResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a template by ID
      tags:
      - Templates
    put:
      consumes:
      - application/json
      description: Updates the name and description of a template (does not affect
        details)
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: integer
      - description: Template data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTemplateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TemplateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a template
      tags:
      - Templates
  /templates/{id}/details:
    post:
      consumes:
      - application/json
      description: Adds a new exercise detail to an existing template
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: integer
      - description: Detail data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddTemplateDetailRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.TemplateDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add a detail to a template
      tags:
      - Templates
  /templates/{id}/details/{detailId}:
    delete:
      description: Removes a specific detail from a template
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: integer
      - description: Detail ID
        in: path
        name: detailId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a detail from a template
      tags:
      - Templates
securityDefinitions:
  BearerAuth:
    description: 'Enter your bearer token in the format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
