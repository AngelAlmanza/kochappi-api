services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kochappi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kochappi_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kochappi" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
